# =============================================================================
# Pipeline CI/CD - Product Order Service
# =============================================================================
# Cette pipeline est déclenchée uniquement lorsque des modifications sont
# apportées au dossier product-order-service. Elle est complètement
# indépendante des autres microservices.
# =============================================================================

name: "CI/CD - Product Order Service"

# ---------------------------------------------------------------------------
# DÉCLENCHEURS (Triggers)
# ---------------------------------------------------------------------------
# La pipeline se déclenche sur :
#   - push sur les branches main et develop (uniquement si product-order-service est modifié)
#   - pull_request vers main et develop (uniquement si product-order-service est modifié)
# Le filtre 'paths' garantit l'indépendance : seules les modifications dans
# le dossier product-order-service déclenchent cette pipeline.
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - main
      - develop
    paths:
      - "neuroguard-backend/product-order-service/**"
      - ".github/workflows/product-order-service-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "neuroguard-backend/product-order-service/**"
      - ".github/workflows/product-order-service-ci.yml"

# ---------------------------------------------------------------------------
# VARIABLES D'ENVIRONNEMENT GLOBALES
# ---------------------------------------------------------------------------
# Centralisées ici pour faciliter la maintenance et éviter la duplication.
# ---------------------------------------------------------------------------
env:
  SERVICE_NAME: product-order-service
  WORKING_DIR: neuroguard-backend/product-order-service
  JAVA_VERSION: "17"
  DOCKER_IMAGE_NAME: neuroguard/product-order-service

# ---------------------------------------------------------------------------
# JOBS
# ---------------------------------------------------------------------------
jobs:

  # =========================================================================
  # JOB 1 : Build & Test
  # =========================================================================
  # Ce job compile l'application, exécute les tests unitaires et
  # génère l'artifact JAR pour le job suivant.
  # =========================================================================
  build-and-test:
    name: "🔨 Build & Test"
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------------
      # Étape 1 : Checkout du code source
      # ---------------------------------------------------------------------
      # Récupère le code source du repository pour que le runner puisse
      # y accéder. Utilise l'action officielle GitHub checkout v4.
      # ---------------------------------------------------------------------
      - name: "📥 Checkout du code source"
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Étape 2 : Configuration du JDK 17
      # ---------------------------------------------------------------------
      # Installe et configure Java 17 (distribution Temurin/Eclipse Adoptium)
      # qui est la version requise par le projet (définie dans pom.xml).
      # Le cache Maven est activé pour accélérer les builds suivants.
      # ---------------------------------------------------------------------
      - name: "☕ Configuration du JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      # ---------------------------------------------------------------------
      # Étape 3 : Cache des dépendances Maven
      # ---------------------------------------------------------------------
      # Met en cache le répertoire local Maven (~/.m2/repository) pour
      # éviter de re-télécharger toutes les dépendances à chaque build.
      # La clé de cache est basée sur le hash du fichier pom.xml.
      # ---------------------------------------------------------------------
      - name: "📦 Cache des dépendances Maven"
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-product-order-${{ hashFiles('neuroguard-backend/product-order-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-product-order-
            ${{ runner.os }}-maven-

      # ---------------------------------------------------------------------
      # Étape 4 : Installation des dépendances
      # ---------------------------------------------------------------------
      # Télécharge toutes les dépendances définies dans le pom.xml sans
      # compiler le projet. L'option -B active le mode batch (non-interactif)
      # et -q réduit la verbosité de la sortie.
      # ---------------------------------------------------------------------
      - name: "📥 Installation des dépendances"
        working-directory: ${{ env.WORKING_DIR }}
        run: mvn dependency:resolve -B -q

      # ---------------------------------------------------------------------
      # Étape 5 : Compilation de l'application
      # ---------------------------------------------------------------------
      # Compile le code source Java sans exécuter les tests.
      # -DskipTests : ignore l'exécution des tests pendant la compilation
      # -B : mode batch (pas d'interaction utilisateur)
      # ---------------------------------------------------------------------
      - name: "🏗️ Build de l'application"
        working-directory: ${{ env.WORKING_DIR }}
        run: mvn clean compile -B

      # ---------------------------------------------------------------------
      # Étape 6 : Exécution des tests unitaires
      # ---------------------------------------------------------------------
      # Lance tous les tests unitaires via Maven Surefire Plugin.
      # En cas d'échec des tests, le job échoue et la pipeline s'arrête.
      # Le profil 'test' utilise H2 en mémoire pour éviter les dépendances
      # externes (pas besoin de MySQL pendant les tests CI).
      # ---------------------------------------------------------------------
      - name: "🧪 Exécution des tests"
        working-directory: ${{ env.WORKING_DIR }}
        run: mvn test -B
        env:
          SPRING_PROFILES_ACTIVE: test

      # ---------------------------------------------------------------------
      # Étape 7 : Packaging de l'application (JAR)
      # ---------------------------------------------------------------------
      # Crée le fichier JAR exécutable. Les tests sont ignorés ici car
      # ils ont déjà été exécutés à l'étape précédente.
      # Le JAR sera utilisé par le job de build Docker.
      # ---------------------------------------------------------------------
      - name: "📦 Packaging de l'application"
        working-directory: ${{ env.WORKING_DIR }}
        run: mvn package -DskipTests -B

      # ---------------------------------------------------------------------
      # Étape 8 : Upload de l'artifact JAR
      # ---------------------------------------------------------------------
      # Sauvegarde le JAR généré comme artifact GitHub Actions pour qu'il
      # soit accessible au job suivant (build Docker).
      # Durée de rétention : 1 jour (suffisant pour le pipeline).
      # ---------------------------------------------------------------------
      - name: "⬆️ Upload de l'artifact JAR"
        uses: actions/upload-artifact@v4
        with:
          name: product-order-service-jar
          path: ${{ env.WORKING_DIR }}/target/*.jar
          retention-days: 1
          if-no-files-found: error

  # =========================================================================
  # JOB 2 : Build Docker Image
  # =========================================================================
  # Ce job construit l'image Docker du microservice.
  # Il dépend du succès du job build-and-test (needs).
  # L'image n'est buildée que sur la branche main (pas sur les PRs).
  # =========================================================================
  docker-build:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: build-and-test
    # Ne build l'image Docker que sur push vers main (pas sur les PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ---------------------------------------------------------------------
      # Étape 1 : Checkout du code source
      # ---------------------------------------------------------------------
      - name: "📥 Checkout du code source"
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Étape 2 : Téléchargement de l'artifact JAR
      # ---------------------------------------------------------------------
      # Récupère le JAR buildé dans le job précédent pour l'inclure
      # dans l'image Docker sans avoir à recompiler.
      # ---------------------------------------------------------------------
      - name: "⬇️ Téléchargement de l'artifact JAR"
        uses: actions/download-artifact@v4
        with:
          name: product-order-service-jar
          path: ${{ env.WORKING_DIR }}/target/

      # ---------------------------------------------------------------------
      # Étape 3 : Configuration de Docker Buildx
      # ---------------------------------------------------------------------
      # Active Docker Buildx pour bénéficier de fonctionnalités avancées
      # comme le cache de couches et le build multi-plateforme.
      # ---------------------------------------------------------------------
      - name: "🔧 Configuration de Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------------------------
      # Étape 4 : Build de l'image Docker
      # ---------------------------------------------------------------------
      # Construit l'image Docker à partir du Dockerfile situé dans le
      # dossier du microservice. L'image est taguée avec :
      #   - le SHA court du commit (pour traçabilité)
      #   - 'latest' (pour commodité)
      # L'option --load charge l'image dans le daemon Docker local.
      # ---------------------------------------------------------------------
      - name: "🐳 Build de l'image Docker"
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------------
      # Étape 5 : Vérification de l'image Docker
      # ---------------------------------------------------------------------
      # Vérifie que l'image a été correctement construite en affichant
      # ses informations (taille, layers, etc.).
      # ---------------------------------------------------------------------
      - name: "✅ Vérification de l'image Docker"
        run: docker images ${{ env.DOCKER_IMAGE_NAME }}

      # =====================================================================
      # (OPTIONNEL) Étape 6 : Push vers Docker Hub ou GitHub Container Registry
      # =====================================================================
      # Décommentez et configurez les étapes ci-dessous pour pousser
      # l'image vers un registry. Nécessite de configurer les secrets
      # DOCKER_USERNAME et DOCKER_PASSWORD dans les settings du repo GitHub.
      # =====================================================================
      # - name: "🔑 Login Docker Hub"
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: "🚀 Push de l'image Docker"
      #   run: |
      #     docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
      #     docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
