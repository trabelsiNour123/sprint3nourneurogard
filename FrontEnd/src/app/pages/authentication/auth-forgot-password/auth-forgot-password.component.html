        <div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card auth-card my-5">
        <div class="card-body auth-card-body">
          <div class="auth-header">
            <div>
              <h3 class="auth-title">Forgot Password</h3>
              <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            </div>
          </div>

          <!-- Success Alert -->
          <div class="alert alert-success alert-dismissible fade show" role="alert" *ngIf="successMessage">
            <i class="ti ti-check-circle me-2"></i>
            {{ successMessage }}
            <button type="button" class="btn-close" (click)="clearMessages()" aria-label="Close"></button>
          </div>

          <!-- Error Alert -->
          <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="errorMessage">
            <i class="ti ti-alert-circle me-2"></i>
            <strong>Error!</strong> {{ errorMessage }}
            <button type="button" class="btn-close" (click)="clearMessages()" aria-label="Close"></button>
          </div>

          <form [formGroup]="forgotPasswordForm" (ngSubmit)="onForgotPassword()">
            <!-- Email -->
            <div class="form-group mb-3">
              <label class="form-label" for="email">Email Address</label>
              <input 
                type="email" 
                class="form-control" 
                [class.is-invalid]="submitted && f['email'].invalid"
                [class.is-valid]="submitted && f['email'].valid && !errorMessage"
                id="email" 
                formControlName="email"
                placeholder="Enter your email address"
                autocomplete="email"
              />
              <div class="invalid-feedback" *ngIf="submitted && f['email'].invalid">
                {{ getEmailErrorMessage() }}
              </div>
            </div>

            <!-- Submit Button -->
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-auth" [disabled]="isLoading">
                <span *ngIf="!isLoading">Send Reset Link</span>
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Sending...
                </span>
              </button>
            </div>

            <!-- Back to Login -->
            <div class="text-center mt-4">
              <p class="text-muted">
                Remember your password? 
                <a href="javascript:void(0)" (click)="goToLogin()" class="link-primary fw-semibold">Back to Login</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
