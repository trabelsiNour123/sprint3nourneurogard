<!-- 
  Exemple HTML pour les boutons de téléchargement PDF
  À intégrer dans votre template Angular
-->

<div class="pdf-download-section">
  <!-- Header -->
  <h2>Télécharger les Documents</h2>

  <!-- Affichage des erreurs -->
  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <!-- Loader -->
  <div *ngIf="isLoading" class="spinner-border" role="status">
    <span class="sr-only">Chargement...</span>
  </div>

  <!-- Boutons de téléchargement -->
  <div class="button-group" *ngIf="!isLoading">
    <!-- Bouton pour télécharger le plan de soins -->
    <button 
      class="btn btn-primary" 
      (click)="downloadCarePlanPdf(carePlan.id)"
      [disabled]="!carePlan?.id">
      📄 Télécharger Plan de Soins (PDF)
    </button>

    <!-- Bouton pour télécharger la prescription -->
    <button 
      class="btn btn-primary" 
      (click)="downloadPrescriptionPdf(prescription.id)"
      [disabled]="!prescription?.id">
      💊 Télécharger Prescription (PDF)
    </button>

    <!-- Bouton pour télécharger le document combiné -->
    <button 
      class="btn btn-success" 
      (click)="downloadCombinedPdf(prescription.id, carePlan.id)"
      [disabled]="!prescription?.id || !carePlan?.id">
      📦 Télécharger Document Combiné (PDF)
    </button>
  </div>
</div>

<!-- Styles SCSS optionnels -->
<style>
  .pdf-download-section {
    margin: 20px 0;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background-color: #f8f9fa;
  }

  .pdf-download-section h2 {
    margin-bottom: 15px;
    font-size: 18px;
    font-weight: bold;
  }

  .button-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .button-group button {
    padding: 10px 20px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
  }

  .btn-primary {
    background-color: #007bff;
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    background-color: #0056b3;
  }

  .btn-success {
    background-color: #28a745;
    color: white;
  }

  .btn-success:hover:not(:disabled) {
    background-color: #218838;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .alert {
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 4px;
  }

  .alert-danger {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .spinner-border {
    display: inline-block;
    width: 2rem;
    height: 2rem;
    vertical-align: text-bottom;
    border: 0.25em solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spinner-border 0.75s linear infinite;
  }

  @keyframes spinner-border {
    to {
      transform: rotate(360deg);
    }
  }
</style>
