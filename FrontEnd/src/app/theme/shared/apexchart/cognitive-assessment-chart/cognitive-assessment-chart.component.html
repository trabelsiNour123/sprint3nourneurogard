<div class="card">
  <div class="card-header">
    <h5 class="card-title">Cognitive Assessment Summary</h5>
    <span class="mmse-status" [ngClass]="getMMSEStatusClass()">
      {{ getMMSEStatus() }}
    </span>
  </div>
  <div class="card-body">
    <apx-chart
      #chart
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [colors]="chartOptions.colors"
      [plotOptions]="chartOptions.plotOptions"
      [labels]="chartOptions.labels"
    >
    </apx-chart>
    <div class="assessment-details">
      <div class="detail-item">
        <span class="label">Avg MMSE:</span>
        <span class="value">{{ averageMMSE | number: '1.1-1' }}/30</span>
      </div>
      <div class="detail-item">
        <span class="label">Avg Functional:</span>
        <span class="value">{{ averageFunctionalAssessment | number: '1.1-1' }}/100</span>
      </div>
      <div class="detail-item">
        <span class="label">Avg ADL:</span>
        <span class="value">{{ averageADL | number: '1.1-1' }}/100</span>
      </div>
    </div>
  </div>
</div>
