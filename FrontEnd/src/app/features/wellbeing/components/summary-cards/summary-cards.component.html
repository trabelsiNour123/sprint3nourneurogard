<div class="row g-3">
    @for (card of cards; track card.title) {
    <div class="col-6 col-lg-3">
        <div class="summary-card" [style.--accent-color]="card.color" [style.--accent-bg]="card.bgColor">
            <div class="card-icon-wrapper">
                <i class="material-icons">{{ card.icon }}</i>
            </div>
            <div class="card-body-content">
                <span class="card-label">{{ card.title }}</span>
                <span class="card-value">{{ card.value }}</span>
                @if (card.badge) {
                <span class="status-badge" [class.good]="card.badge === 'Good'"
                    [class.moderate]="card.badge === 'Moderate'" [class.poor]="card.badge === 'Poor'">
                    {{ card.badge }}
                </span>
                }
            </div>
            <div class="card-trend" [style.color]="getTrendColor(card.trend)">
                <i class="material-icons">{{ getTrendIcon(card.trend) }}</i>
                <span>{{ card.trendText }}</span>
            </div>
        </div>
    </div>
    }
</div>
