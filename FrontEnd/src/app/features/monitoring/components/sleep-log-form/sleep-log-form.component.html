<app-card cardTitle="Quick Log: Night Sleep" [showHeader]="true" [cardClass]="'glass-card sleep-theme animate-fade-in thin-card'">
    <div class="sleep-input-wrapper mt-2">

        @if (alreadyLoggedToday) {
        <div class="already-logged-state text-center py-3">
            <div class="already-logged-icon mb-2">
                <i class="material-icons text-success" style="font-size: 3rem;">check_circle</i>
            </div>
            <p class="fw-semibold mb-1">Sleep already logged today</p>
            <p class="text-muted small mb-0">You can log again tomorrow night.</p>
        </div>
        } @else {
        <form (ngSubmit)="onSubmit()" #sleepForm="ngForm">
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label">Duration</label>
                    <div class="input-with-icon">
                        <i class="material-icons">schedule</i>
                        <input type="number" class="form-control" [(ngModel)]="hours" name="hours" min="0" max="24" placeholder="hrs" required>
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label">Interruptions</label>
                    <div class="input-with-icon">
                        <i class="material-icons">notifications_active</i>
                        <input type="number" class="form-control" [(ngModel)]="disturbances" name="disturbances" min="0" placeholder="qty" required>
                    </div>
                </div>
            </div>

            @if (message) {
            <div class="alert mt-4 shadow-sm" [class.alert-success]="messageType === 'success'" [class.alert-danger]="messageType === 'error'">
                <i class="material-icons">{{ messageType === 'success' ? 'check_circle' : 'error' }}</i>
                <span>{{ message }}</span>
            </div>
            }

            <button type="submit" class="btn btn-sleep w-100 mt-4" [disabled]="!sleepForm.form.valid || isProcessing">
                <div class="btn-content">
                    <i class="material-icons">{{ isProcessing ? 'autorenew' : 'bedtime' }}</i>
                    <span>{{ isProcessing ? 'Logging...' : 'Log Night Sleep' }}</span>
                </div>
            </button>
        </form>
        }

    </div>
</app-card>
