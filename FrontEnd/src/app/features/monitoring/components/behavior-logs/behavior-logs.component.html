<app-card cardTitle="Behavioral / Agitation Logs" [showHeader]="true" [cardClass]="'glass-card animate-fade-in'">
    @if (loading) {
    <div class="text-center p-4">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
    } @else {
    <div class="log-table">
        <div class="log-header">
            <span>Date</span><span>Time</span><span>Type</span><span>Severity</span><span>Notes</span>
        </div>
        @for (log of logs; track log.id) {
        <div class="log-row">
            <span class="log-date">{{ formatDate(log.date) }}</span>
            <span class="log-time">{{ log.time }}</span>
            <span class="log-type"><i class="material-icons">{{ getTypeIcon(log.type) }}</i> {{ log.type }}</span>
            <span class="log-severity"><span class="severity-badge" [ngClass]="getSeverityClass(log.severity)">{{
                    log.severity }}</span></span>
            <span class="log-notes">{{ log.notes }}</span>
        </div>
        }
    </div>
    }
</app-card>
