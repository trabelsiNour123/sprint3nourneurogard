spring:
  application:
    name: risk-alert-service
  datasource:
    url: jdbc:h2:mem:riskalerttestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  cloud:
    discovery:
      enabled: false
    openfeign:
      lazy-attributes-resolution: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

ml:
  service:
    url: http://localhost:5000

jwt:
  secret: test-secret

logging:
  level:
    root: WARN
    com.neuroguard.riskalertservice: WARN
